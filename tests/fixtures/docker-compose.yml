services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_USER: testuser
    ports: ["15432:5432"]
    volumes:
      - ./seed/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql-test:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports: ["13306:3306"]
    volumes:
      - ./seed/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "testuser", "-ptestpass"]
      interval: 2s
      timeout: 5s
      retries: 10

  mariadb-test:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports: ["13307:3306"]
    volumes:
      - ./seed/mariadb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "testuser", "-ptestpass"]
      interval: 2s
      timeout: 5s
      retries: 10
