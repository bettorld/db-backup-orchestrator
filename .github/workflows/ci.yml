name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: make build IMAGE_TAG=latest PUSH=false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: make build-test

      - name: Run ruff
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: make build-test

      - name: Run unit tests with coverage
        run: |
          TEST_IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -- '-test$' | head -1)
          docker run --name dbo-coverage \
            "$TEST_IMAGE" \
            tests/unit/ \
            --cov=db_backup_orchestrator \
            --cov-report=term-missing \
            --cov-report=xml:/app/coverage.xml \
            --timeout=30

      - name: Extract coverage report
        if: always()
        run: |
          docker cp dbo-coverage:/app/coverage.xml ./coverage.xml 2>/dev/null || true
          docker rm dbo-coverage

      - name: Upload coverage to Codecov
        if: hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: make build-test

      - name: Run integration tests
        run: make test-integration
